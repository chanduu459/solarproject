name: solarproject
description: "A solar installation tracking and management application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # Backend Integration
  supabase_flutter: ^2.12.0

  # Local Storage & Offline Cache
  hive_flutter: ^1.1.0 # <--- ADD THIS
  hive: ^2.2.3         # <--- ADD THIS

  # UI & Utilities
  flutter_screenutil: ^5.9.3
  intl: ^0.19.0
  path: ^1.9.0

  # Features (Image & Signature)
  image_picker: ^1.1.2
  signature: ^5.5.0
  geolocator: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # If you create Hive TypeAdapters, you'll eventually need these:
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/